name: Deploy to Kubernetes

on:
  push:
    branches: [main]
  # Allow manual trigger (after local image push)
  workflow_dispatch:

env:
  IMAGE: ghcr.io/htl-leo-itp-25-27-4-5bhitm/dicekeeper
  NAMESPACE: student-it200233

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ always() && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl -n $NAMESPACE delete secret dicekeeper-db-secret --ignore-not-found
          kubectl -n $NAMESPACE create secret generic dicekeeper-db-secret \
            --from-literal=username=${{ secrets.DB_USER }} \
            --from-literal=password=${{ secrets.DB_PASSWORD }}
          kubectl -n $NAMESPACE apply -f k8s/pvc.yaml
          kubectl -n $NAMESPACE apply -f k8s/service.yaml
          kubectl -n $NAMESPACE apply -f k8s/deployment.yaml
          kubectl -n $NAMESPACE apply -f k8s/ingress.yaml

      - name: Update deployment image
        run: |
          kubectl -n $NAMESPACE set image deployment/dicekeeper \
            dicekeeper=${{ env.IMAGE }}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl -n $NAMESPACE rollout status deployment/dicekeeper --timeout=120s
