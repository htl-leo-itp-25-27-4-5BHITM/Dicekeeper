name: Deploy to Kubernetes

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/htl-leo-itp-25-27-4-5bhitm/dicekeeper
  KEYCLOAK_IMAGE: ghcr.io/htl-leo-itp-25-27-4-5bhitm/keycloak-dicekeeper
  NAMESPACE: student-it200233

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect Keycloak changes
        id: keycloak-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$BEFORE_SHA" ] && \
             [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && \
             git rev-parse --verify -q "$BEFORE_SHA^{commit}" >/dev/null; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" "$CURRENT_SHA")"
          else
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -m -r "$CURRENT_SHA")"
          fi

          if printf '%s\n' "$CHANGED_FILES" | grep -qE '^(keycloak/|k8s/keycloak-deployment\.yaml$)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=dicekeeper
          cache-to: type=gha,mode=max,scope=dicekeeper

      - name: Build and push Keycloak image
        if: steps.keycloak-changes.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: keycloak/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.KEYCLOAK_IMAGE }}:latest
            ${{ env.KEYCLOAK_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=keycloak
          cache-to: type=gha,mode=max,scope=keycloak

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl -n $NAMESPACE delete secret dicekeeper-db-secret --ignore-not-found
          kubectl -n $NAMESPACE create secret generic dicekeeper-db-secret \
            --from-literal=username=${{ secrets.DB_USERNAME }} \
            --from-literal=password=${{ secrets.DB_PASSWORD }}
          kubectl -n $NAMESPACE delete secret dicekeeper-secret --ignore-not-found
          kubectl -n $NAMESPACE create secret generic dicekeeper-secret \
            --from-literal=KEYCLOAK_AUTH_SERVER_URL=${{ secrets.KEYCLOAK_AUTH_SERVER_URL }} \
            --from-literal=KEYCLOAK_CLIENT_ID=${{ secrets.KEYCLOAK_CLIENT_ID }} \
            --from-literal=KEYCLOAK_CLIENT_SECRET=${{ secrets.KEYCLOAK_CLIENT_SECRET }} \
            --from-literal=KEYCLOAK_STATE_SECRET=${{ secrets.KEYCLOAK_STATE_SECRET }}
          kubectl -n $NAMESPACE apply -f k8s/keycloak-service.yaml
          kubectl -n $NAMESPACE apply -f k8s/keycloak-deployment.yaml
          if [ "${{ steps.keycloak-changes.outputs.changed }}" = "true" ]; then
            kubectl -n $NAMESPACE rollout restart deployment/keycloak
          fi
          kubectl -n $NAMESPACE apply -f k8s/pvc.yaml
          kubectl -n $NAMESPACE apply -f k8s/service.yaml
          sed "s|image: ghcr.io/htl-leo-itp-25-27-4-5bhitm/dicekeeper:latest|image: $IMAGE:${{ github.sha }}|" k8s/deployment.yaml | kubectl -n $NAMESPACE apply -f -
          kubectl -n $NAMESPACE apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl -n $NAMESPACE rollout status deployment/keycloak --timeout=180s
          kubectl -n $NAMESPACE rollout status deployment/dicekeeper --timeout=120s

      - name: Purge Cloudflare cache
        run: |
          curl --fail-with-body -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "files": [
                "https://dicekeeper.net/",
                "https://dicekeeper.net/index.html"
              ]
            }'
