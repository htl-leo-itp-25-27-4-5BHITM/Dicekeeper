# ?? Common ??
quarkus.datasource.db-kind=postgresql
quarkus.devservices.enabled=false

# Upload limits (100MB)
quarkus.http.limits.max-body-size=100M
quarkus.http.limits.max-form-attribute-size=100M

# Upload directory (used by CampaignResource and PlayerResource)
%dev.dicekeeper.upload-dir=uploads
%prod.dicekeeper.upload-dir=/app/uploads

# Keycloak / OIDC
quarkus.oidc.client-id=${KEYCLOAK_CLIENT_ID:dicekeeper-web}
quarkus.oidc.credentials.secret=${KEYCLOAK_CLIENT_SECRET:replace-me}
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.scopes=openid,profile,email
quarkus.oidc.authentication.user-info-required=true
quarkus.oidc.authentication.cookie-path=/
quarkus.oidc.authentication.pkce-required=true
quarkus.oidc.authentication.state-secret=${KEYCLOAK_STATE_SECRET:replace-with-at-least-32-chars-state-secret}
quarkus.oidc.authentication.java-script-auto-redirect=true
quarkus.oidc.authentication.redirect-path=/api/auth/callback
quarkus.oidc.authentication.error-path=/api/auth/error
quarkus.oidc.authentication.session-expired-path=/api/auth/session-expired
quarkus.oidc.authentication.restore-path-after-redirect=true
quarkus.oidc.logout.path=/api/auth/logout
quarkus.oidc.logout.post-logout-path=/

# The logout path is virtual and must still be protected.
quarkus.http.auth.permission.authenticated-logout.paths=/api/auth/logout
quarkus.http.auth.permission.authenticated-logout.policy=authenticated

# ?? Dev profile (local development via port-forward) ??
%dev.quarkus.datasource.username=keeperofthedice
%dev.quarkus.datasource.password=dicekeeper
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/keeperofthedice
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.http.body.uploads-directory=uploads
%dev.quarkus.oidc.auth-server-url=http://localhost:8000/realms/dicekeeper
%dev.quarkus.oidc.discovery-enabled=false
%dev.quarkus.oidc.authorization-path=/protocol/openid-connect/auth
%dev.quarkus.oidc.token-path=/protocol/openid-connect/token
%dev.quarkus.oidc.user-info-path=/protocol/openid-connect/userinfo
%dev.quarkus.oidc.jwks-path=/protocol/openid-connect/certs
%dev.quarkus.oidc.end-session-path=/protocol/openid-connect/logout
%dev.quarkus.oidc.token.issuer=any

# ?? Prod profile (Kubernetes) ??
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/dicekeeper_prod
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.http.body.uploads-directory=/app/uploads
%prod.quarkus.http.proxy.proxy-address-forwarding=true
%prod.quarkus.http.proxy.allow-x-forwarded=true
%prod.quarkus.http.proxy.enable-forwarded-host=true
%prod.quarkus.hibernate-orm.sql-load-script=no-file
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_AUTH_SERVER_URL}
%prod.quarkus.oidc.authentication.force-redirect-https-scheme=true
%prod.quarkus.oidc.token.issuer=any
