# ?? Common ??
quarkus.datasource.db-kind=postgresql
quarkus.devservices.enabled=false

# Upload limits (100MB)
quarkus.http.limits.max-body-size=100M
quarkus.http.limits.max-form-attribute-size=100M

# Upload directory (used by CampaignResource and PlayerResource)
%dev.dicekeeper.upload-dir=uploads
%prod.dicekeeper.upload-dir=/app/uploads

# ?? Dev profile (local development via port-forward) ??
%dev.quarkus.datasource.username=keeperofthedice
%dev.quarkus.datasource.password=dicekeeper
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/keeperofthedice
%dev.quarkus.hibernate-orm.database.generation=update
%dev.quarkus.http.body.uploads-directory=uploads

# ?? Prod profile (Kubernetes) ??
%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://postgres:5432/keeperofthedice
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.http.body.uploads-directory=/app/uploads
%prod.quarkus.hibernate-orm.sql-load-script=no-file
